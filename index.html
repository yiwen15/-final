<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字部件探險傳說 | Character Quest</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <script>
        window.onerror = function(msg, url, line) {
            const e = document.createElement('div');
            e.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff0000;color:white;padding:10px;z-index:99999;font-size:12px;';
            e.textContent = 'JS Error: ' + msg + ' (line ' + line + ')';
            document.body.prepend(e);
        };
    </script>
    <header class="top-bar" id="navbar" style="display: none;">
        <div class="logo">🔮 字部件探險傳說</div>
        <div class="user-stats">
            <button class="btn btn-secondary" onclick="showIsland()" style="padding:5px 15px;font-size:0.9rem;">🗺️ 我的島嶼</button>
            <div class="stat-item"><span>等級</span> <span class="level-badge" id="user-level">1</span></div>
            <div class="stat-item" style="flex-direction:column;align-items:flex-start;gap:2px;">
                <div style="display:flex;justify-content:space-between;width:100%;font-size:0.7rem;">
                    <span>經驗值 (XP)</span><span id="user-xp-text">0 / 100</span>
                </div>
                <div class="xp-container"><div class="xp-fill" id="user-xp-fill"></div></div>
                <div id="milestone-text" class="milestone-counter">距離解鎖還有 5 字</div>
            </div>
            <div class="stat-item" id="userName">冒險者</div>
            <button class="btn btn-secondary" onclick="showScreen('profile-screen'); renderProfile();" style="padding:5px 15px;font-size:0.8rem;background:var(--accent-purple);color:white;">🔮 精靈卡</button>
            <button class="btn btn-secondary" onclick="showCardBook()" style="padding:5px 15px;font-size:0.8rem;background:var(--accent-blue);color:white;">📖 字卡冊</button>
            <button class="btn btn-secondary" onclick="showEquipment()" style="padding:5px 15px;font-size:0.8rem;">🛡️ 裝備</button>
            <button class="btn btn-secondary" onclick="showIntroManual()" style="padding:5px 15px;font-size:0.8rem;background:var(--primary-color);">📜 冒險書</button>
            <button class="btn btn-secondary" onclick="exportStudentShareCode()" style="padding:5px 15px;font-size:0.8rem;background:#10b981;color:white;">📤 匯出進度</button>
            <button class="btn btn-secondary" onclick="logout()" style="padding:5px 10px;font-size:0.8rem;">登出</button>
        </div>
    </header>
    <main>
        <!-- 1. Login Screen -->
        <section id="login-screen" class="screen active">
            <div class="login-container">
                <h1>歡迎來到字部件探險傳說！</h1>
                <div style="margin-bottom:2rem;">
                    <input type="text" id="usernameInput" placeholder="輸入你的冒險代號"
                           style="width:100%;padding:15px;border-radius:10px;background:rgba(255,255,255,0.1);color:white;border:2px solid var(--text-gold);font-size:1.1rem;margin-bottom:1rem;box-sizing:border-box;text-align:center;"
                           onkeydown="if(event.key==='Enter') login('student')">
                    <div style="display:flex;gap:10px;margin-bottom:1rem;justify-content:center;">
                        <button class="btn btn-grade active" onclick="selectGrade('1A', this)">一上</button>
                        <button class="btn btn-grade" onclick="selectGrade('1B', this)">一下</button>
                        <button class="btn btn-grade" onclick="selectGrade('2A', this)">二上</button>
                        <button class="btn btn-grade" onclick="selectGrade('2B', this)">二下</button>
                    </div>
                    <button class="btn" onclick="login('student')" style="width:100%;">🚀 開始冒險</button>
                </div>
                <div style="display:flex;flex-direction:column;gap:10px;">
                    <button class="btn btn-secondary" onclick="login('teacher')">我是導師</button>
                    <button class="btn btn-secondary" onclick="openStudentImportModal()" style="font-size:0.9rem;">📥 匯入我的進度</button>
                </div>
            </div>
        </section>
        <!-- 2. Map Screen -->
        <section id="map-screen" class="screen">
            <div style="text-align:center;margin-bottom:2rem;">
                <h2 style="color:var(--text-gold);font-size:2rem;">🗺️ 部件大陸</h2>
                <p style="opacity:0.8;">選擇一個部件島嶼，開始探索！</p>
            </div>
            <div class="map-grid" id="area-map"></div>
        </section>
        <!-- 3. Library Screen -->
        <section id="library-screen" class="screen">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;">
                <button class="btn btn-secondary" onclick="showScreen('map-screen')">← 返回地圖</button>
                <h2 id="area-title-display">探索中...</h2>
                <div id="area-stats"></div>
            </div>
            <div class="character-grid" id="char-list"></div>
        </section>
